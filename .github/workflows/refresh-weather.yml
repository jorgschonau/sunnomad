name: Daily Weather Refresh

on:
  schedule:
    - cron: '0 5 * * *'  # Every day at 5 AM UTC (6-7h EU, 1h US East, 22h US West)
  workflow_dispatch:  # Manual trigger for testing

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install @supabase/supabase-js dotenv
      
      - name: Run weather refresh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          OPEN_METEO_API_KEY: ${{ secrets.OPEN_METEO_API_KEY }}
        run: node scripts/refresh-all-weather.js
